version: "3.9"

# Usage:
#   1. Copy .env.example to .env
#   2. Set WORKSPACE_PATH in .env to the absolute path of your iOS project
#   3. docker compose up

services:
  neo4j:
    image: neo4j:5-community
    container_name: code-graph-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP Browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-codegraph123}
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 5

  graph-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: code-graph-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ${WORKSPACE_PATH}:/workspace:ro
      - ./logs:/app/logs
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-codegraph123}
      - WORKSPACE=/workspace
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}   # optional: enables hybrid search
    depends_on:
      neo4j:
        condition: service_healthy
    command: uvicorn src.mcp.server:app --host 0.0.0.0 --port 8080 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  watcher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: code-graph-watcher
    restart: unless-stopped
    volumes:
      - ${WORKSPACE_PATH}:/workspace:ro
      - ./logs:/app/logs
    environment:
      - GRAPH_API_URL=http://graph-api:8080
      - WORKSPACE=/workspace
    depends_on:
      graph-api:
        condition: service_healthy
    command: python watcher.py --path /workspace --polling

volumes:
  neo4j_data:
  neo4j_logs:
